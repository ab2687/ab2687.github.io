<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asia Bragg | Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Professional styling for the embed section */
        .app-showcase {
            padding: 60px 5%;
            background-color: #020617; /* Matches the app theme */
            text-align: center;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            margin: 30px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #8b5cf6; /* Violet accent from your app */
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
            background: #000;
        }

        /* Responsive height for the app window */
        iframe {
            width: 100%;
            height: 850px;
            border: none;
            display: block;
        }

        .btn-fullscreen {
            display: inline-block;
            margin-top: 15px;
            color: #06b6d4;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <section class="app-showcase">
        <h2 style="font-family: 'Outfit'; font-size: 2.5rem;">Interactive Audit Lab 🛡️</h2>
        <p>A custom-built AIS simulation focusing on tax liability and data integrity.</p>

        <div class="iframe-container">
            <iframe 
                src="https://ab2687.github.io/" 
                title="Bragg Tax Shield & Audit Lab"
                loading="lazy">
            </iframe>
            </div>

        <a href="https://ab2687.github.io/" target="_blank" class="btn-fullscreen">
            Launch in Full Screen Window ↗️
        </a>
    </section>

    </body>
</html>
